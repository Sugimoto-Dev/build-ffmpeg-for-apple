name: Build FFmpeg XCFramework

on:
  workflow_dispatch:
    inputs:
      ffmpeg_ref:
        description: FFmpeg git tag or branch
        required: true
        default: n8.1
      libass_ref:
        description: libass git tag
        required: true
        default: "0.17.4"
      license_mode:
        description: FFmpeg license mode
        required: true
        default: "lgpl"
      release_tag:
        description: Optional GitHub release tag; leave empty to upload artifacts only
        required: false
        default: ""

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      OUT_DIR: ${{ github.workspace }}/out
      WORK_DIR: ${{ github.workspace }}/work
      DEPS_DIR: ${{ github.workspace }}/deps
      FFMPEG_SRC: ${{ github.workspace }}/FFmpeg
      SCRIPT: ${{ github.workspace }}/build_ffmpeg_xcframework.swift
      DEPS_SCRIPT: ${{ github.workspace }}/build_libass_deps_from_source.sh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available SDKs
        run: xcodebuild -showsdks

      - name: Prepare directories
        run: |
          set -euxo pipefail
          rm -rf "$OUT_DIR" "$WORK_DIR" "$DEPS_DIR" "$FFMPEG_SRC" "$GITHUB_WORKSPACE/src-deps" "$GITHUB_WORKSPACE/work-deps"
          mkdir -p "$OUT_DIR" "$WORK_DIR" "$DEPS_DIR"

      - name: Install build tools
        run: |
          set -euxo pipefail
          brew update
          brew install autoconf automake libtool pkg-config cmake meson ninja nasm

      - name: Build libass dependencies from source
        run: |
          set -euxo pipefail
          chmod +x "$DEPS_SCRIPT"
          LIBASS_REF="${{ github.event.inputs.libass_ref }}" \
          OUT_DIR="$DEPS_DIR" \
          WORK_DIR="$GITHUB_WORKSPACE/work-deps" \
          SRC_DIR="$GITHUB_WORKSPACE/src-deps" \
          "$DEPS_SCRIPT"

      - name: Show prepared dependency layout
        run: |
          set -euxo pipefail
          find "$DEPS_DIR/libass" -maxdepth 5 | sort | sed -n '1,120p'
          echo "---"
          sed -n '1,80p' "$DEPS_DIR/libass/ios/thin/arm64/lib/pkgconfig/libass.pc"

      - name: Clone FFmpeg source
        run: |
          set -euxo pipefail
          git clone --branch "${{ github.event.inputs.ffmpeg_ref }}" --depth 1 https://github.com/FFmpeg/FFmpeg.git "$FFMPEG_SRC"
          git -C "$FFMPEG_SRC" describe --tags || true
          git -C "$FFMPEG_SRC" rev-parse HEAD

      - name: Build XCFrameworks
        run: |
          set -euxo pipefail
          xcrun swift "$SCRIPT" \
            --source "$FFMPEG_SRC" \
            --output "$OUT_DIR" \
            --work "$WORK_DIR" \
            --platforms ios,iossimulator,macos,tvos,tvossimulator \
            --min-ios 14.0 \
            --min-macos 11.0 \
            --min-tvos 14.0 \
            --license "${{ github.event.inputs.license_mode }}" \
            --enable-libass \
            --enable-drawtext \
            --enable-avdevice \
            --avdevice-platforms ios,iossimulator,macos \
            --dependency-prefix-template "libass=$DEPS_DIR/libass/{platform}/thin/{arch}" \
            --dependency-prefix-template "freetype=$DEPS_DIR/libfreetype/{platform}/thin/{arch}" \
            --dependency-prefix-template "harfbuzz=$DEPS_DIR/libharfbuzz/{platform}/thin/{arch}" \
            --dependency-prefix-template "fribidi=$DEPS_DIR/libfribidi/{platform}/thin/{arch}" \
            --dependency-prefix-template "unibreak=$DEPS_DIR/libunibreak/{platform}/thin/{arch}" \
            --zip \
            --verbose

      - name: Generate SHA256 files
        run: |
          set -euxo pipefail
          cd "$OUT_DIR"
          for file in *.xcframework.zip; do
            shasum -a 256 "$file" > "$file.sha256"
          done

      - name: List outputs
        run: |
          set -euxo pipefail
          find "$OUT_DIR" -maxdepth 1 | sort

      - name: Upload XCFramework artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-xcframeworks-${{ github.event.inputs.ffmpeg_ref }}
          path: |
            out/*.xcframework.zip
            out/*.sha256
            out/*.xcframework
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          files: |
            out/*.xcframework.zip
            out/*.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
